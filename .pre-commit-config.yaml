repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        # No --fix so you see the same errors as CI
      - id: ruff-format  # if you also want formatting

  - repo: local
    hooks:
      - id: sync-todo
        name: Sync TODO.md from Obsidian
        entry: python scripts/sync_todo.py
        language: python
        additional_dependencies: [pyyaml]
        pass_filenames: false
        always_run: true

