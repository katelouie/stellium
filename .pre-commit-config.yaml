repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        # No --fix so you see the same errors as CI
      - id: ruff-format  # if you also want formatting

  - repo: local
    hooks:
      - id: sync-todo
        name: Sync TODO.md from Obsidian
        entry: python scripts/sync_todo.py
        language: python
        additional_dependencies: [pyyaml]
        pass_filenames: false
        always_run: true

      # POST-commit, deliberately. It cannot block a commit and cannot fail a push —
      # it prints a reminder or it says nothing. Install with:
      #     pre-commit install --hook-type post-commit
      - id: docs-staleness
        name: Docs freshness reminder
        stages: [post-commit]
        entry: python scripts/docs_staleness.py
        # `language: python` — NOT `system`. system resolves `python` through the
        # pyenv shim, which here points at a version that isn't installed, so the
        # reminder failed with exit 1: a hook whose whole promise is "never blocking"
        # was the only thing in the run printing red. The script is pure stdlib and
        # needs no project deps, so pre-commit's own venv is the right home for it.
        language: python
        pass_filenames: false
        always_run: true
        verbose: true          # pre-commit swallows stdout on success without this

