# Stellium — a custom Sphinx theme (inherits the built-in `basic` theme).
# Docs: https://www.sphinx-doc.org/en/master/development/theming.html

[theme]
inherit = basic
stylesheet = stellium.css
pygments_style = default

[options]
# Overridable from conf.py via html_theme_options = {...}
accent = #5b46b0
accent_dark = #9b8ae8
gold = #a9782a
gold_dark = #d9b46a
github_url =
default_mode = light
show_version = true
