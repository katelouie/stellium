  - trait: Unconventional, indifferent to social convention and dress
    tags:
    - unconventional
    - nonconformist
    evidence: 'Hodges (quoted by PBS NewsHour): ''He was a hippie before his time... very casual in those
      days, and thought very scruffy'''
    source: Hodges (1983), via PBS NewsHour
  - trait: Honest and unapologetic, even at personal cost
    tags:
    - honest
    evidence: On arrest said the law was wrong; made little effort to hide his homosexuality; gave a frank
      statement
    source: Hodges (1983); PBS NewsHour
  - trait: Humorous, cheerful, brimming with boyish enthusiasm
    tags:
    - humorous
    - curious
    evidence: 'Copeland: ''cheerful, lively, stimulating, comic''; raucous laugh;  keen sense of humor'
    source: Copeland, OUPblog; Slate (on Hodges)
  - trait: Athletic and solitary; a serious distance runner
    tags:
    - disciplined
    - solitary
    evidence: 'Competitive amateur marathoner: personal best 2 hr 46 min 3 sec  at the 1947 AAA Championships;
      ran between work sites; Newman called him ''a confirmed solitary'''
    source: MacTutor / Andrew Hodges; PBS NewsHour
  notes: 'SCHOLARLY DISPUTE on death cause: the 1954 inquest ruled suicide; Prof. Jack Copeland argues
    the evidence is equally consistent with accidental inhalation of cyanide from home gold-electroplating
    experiments, noting the coroner''s superficial investigation and Turing''s reported good spirits.
    Biographers Hodges and Leavitt lean suicide; Copeland leans accident. Flagged per instructions. (Enricher
    note: Turing''s marathon PB was set at the 1947 AAA Championships, not 1948; a 1948 leg injury ended
    his Olympic-team contention.)'
