  - trait: Rationalist; skeptical of religion, committed to facing hard truths
    tags:
    - rational
    - skeptical
    evidence: Avowed atheist; insisted on reality over consoling illusion (The Future of an Illusion)
    source: Britannica; Gay (1988)
  notes: 'PHYSICIAN-ASSISTED DEATH: Freud died 23 September 1939 after Max Schur administered escalating
    morphine doses at Freud''s explicit request (''Now it is nothing but torture and makes no sense'').
    A revised account (via Josephine Stross) proposes a third/final dose and slightly different timing;
    flagged honestly rather than logged as ''cancer, age 83''. Circumcision 13 May 1856 (Jewish 8-day
    tradition) is genuinely dated. ''The Interpretation of Dreams'' issued November 1899, post-dated 1900.'
