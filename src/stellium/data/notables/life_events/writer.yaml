- name: Jorge Luis Borges
  events:
  - date: '1914'
    precision: year
    type: relocation
    description: Family moved to Geneva, Switzerland; attended Collège de Genève through WWI
    significance: major
    age_at_event: 14
    source: Wikipedia; Britannica
  - date: '1919'
    precision: year
    type: relocation
    description: Left Geneva for Spain; joined the avant-garde Ultraist literary movement
    significance: moderate
    age_at_event: 19
    source: Britannica; New World Encyclopedia
  - date: '1921'
    precision: year
    type: relocation
    description: Returned to Buenos Aires; began publishing poems and essays
    significance: moderate
    age_at_event: 21
    source: Wikipedia
  - date: '1938'
    precision: year
    type: bereavement_parent
    description: Father Jorge Guillermo Borges died (some sources give 14 Feb 1938)
    significance: major
    age_at_event: 38
    source: Encyclopedia.com; Shipwreck Library timeline
  - date: '1938-12-24'
    precision: day
    type: accident
    description: Severe head wound on Christmas Eve; the wound became infected and he developed near-fatal
      septicemia. Per Britannica, the injury and subsequent blood poisoning 'left him near death, bereft
      of speech, and fearing for his sanity'; he based his 1944 story 'El Sur' on the event, which preceded
      his turn to the fictions that made him famous.
    significance: major
    age_at_event: 39
    source: Britannica; Borges autobiographical essay quoted in SciELO
  - date: '1944'
    precision: year
    type: career
    description: Published Ficciones, the collection on which his fame chiefly rests
    significance: major
    age_at_event: 44
    source: Encyclopedia.com; Britannica
  - date: '1955'
    precision: year
    type: career
    description: Appointed director of the National Library of Argentina in the same period he became
      effectively blind — 'God, who with such splendid irony / granted me books and blindness at one touch'
      (Poem of the Gifts)
    significance: major
    age_at_event: 55
    source: Wikipedia; Lapham's Quarterly; Borges, 'Poem of the Gifts'
  - date: 1961-05
    precision: month
    type: recognition
    description: Awarded the first Prix International (Premio Internacional de Editores), May 1961, by
      six publishers (Seix Barral, Gallimard, Einaudi, Grove, Weidenfeld & Nicolson, Rowohlt); the vote
      deadlocked and was split with Samuel Beckett, bringing Borges international fame
    significance: major
    age_at_event: 61
    source: Borges Center (Univ. of Pittsburgh); Wikipedia; culturedallroundman (Prix International 1961)
  - date: '1967'
    precision: year
    type: relationship
    description: First marriage, to Elsa Astete Millán (registered 4 Aug 1967 per di Giovanni; divorced
      1970)
    significance: moderate
    age_at_event: 67
    source: Borges Center; Norman Thomas di Giovanni, Georgie and Elsa
  - date: '1975'
    precision: year
    type: bereavement_parent
    description: Mother Leonor Acevedo died, aged 99; she had been his secretary and companion since his
      blindness
    significance: major
    age_at_event: 75
    source: Wikipedia; Shipwreck Library timeline
  - date: '1986-06-14'
    precision: day
    type: health_crisis
    description: Died of liver cancer in Geneva; had married María Kodama by proxy in April 1986
    significance: major
    age_at_event: 86
    source: Wikipedia; NNDB
- name: Maya Angelou
  events:
  - date: '1931'
    precision: year
    type: relocation
    description: After her parents' separation, she and her brother Bailey were sent to their paternal
      grandmother in Stamps, Arkansas
    significance: major
    age_at_event: 3
    source: Wikipedia; British Online Archives
  - date: '1935'
    precision: year
    type: other
    description: As an eight-year-old child she was the victim of sexual abuse by her mother's boyfriend
      (Mr. Freeman) during a stay in St. Louis
    significance: major
    age_at_event: 8
    source: Britannica; Wikipedia
  - date: '1936'
    precision: year
    type: health_crisis
    description: 'Became mute for roughly 5½ years after the abuse and the killing of the abuser. Angelou:
      ''I was a mute from the time I was seven and a half until I was almost 13. I didn''t speak. I had
      voice, but I refused to use it.'''
    significance: major
    age_at_event: 8
    source: Maya Angelou, Academy of Achievement interview; Wikipedia
  - date: '1945-09-08'
    precision: day
    type: childbirth
    description: 'Gave birth to her only child, son Clyde ''Guy'' Johnson, in San Francisco. Per his obituary:
      ''Mr. GUY JOHNSON was born on September 8, 1945, in San Francisco, California, the only child of
      Dr. Maya Angelou.'''
    significance: major
    age_at_event: 17
    source: Guy Johnson obituary (San Francisco Chronicle/Legacy.com); Encyclopedia.com (Women in World
      History)
  - date: '1951'
    precision: year
    type: relationship
    description: First marriage, to Tosh Angelos, a Greek-American electrician and former sailor (divorced
      c. 1954)
    significance: moderate
    age_at_event: 23
    source: Wikipedia; Marcia Ann Gillespie biography
  - date: '1954'
    precision: year
    type: career
    description: Toured Europe with the opera Porgy and Bess (1954–55), launching her performing career
    significance: moderate
    age_at_event: 26
    source: Wikipedia
  - date: '1960'
    precision: year
    type: career
    description: Named northern coordinator of the Southern Christian Leadership Conference (SCLC) at
      Martin Luther King Jr.'s request
    significance: moderate
    age_at_event: 32
    source: Wikipedia; Biography.com
  - date: '1965'
    precision: year
    type: bereavement_other
    description: Returned to the US (Feb 1965) to help Malcolm X build the Organization of Afro-American
      Unity; devastated by his assassination on 21 Feb 1965, weeks after her return
    significance: major
    age_at_event: 36
    source: The Conversation; Journal of Global History (Cambridge); Wikipedia
  - date: '1968-04-04'
    precision: day
    type: bereavement_other
    description: MLK assassinated on her 40th birthday; thereafter she stopped celebrating her birthday,
      sending flowers to Coretta Scott King instead
    significance: major
    age_at_event: 40
    source: Wikipedia; Gillespie
  - date: '1969'
    precision: year
    type: recognition
    description: Published I Know Why the Caged Bird Sings, which brought her international acclaim and
      was the first nonfiction bestseller by a Black woman
    significance: major
    age_at_event: 41
    source: Wikipedia; Smithsonian; ZSR Library (Wake Forest)
  - date: '1993-01-20'
    precision: day
    type: recognition
    description: Recited 'On the Pulse of Morning' at Bill Clinton's first inauguration — first inaugural
      poet since Robert Frost (1961)
    significance: major
    age_at_event: 64
    source: Obama White House archive (Clinton Library caption); Wikipedia
  - date: '2014-05-28'
    precision: day
    type: health_crisis
    description: Died at her home in Winston-Salem, North Carolina, aged 86
    significance: major
    age_at_event: 86
    source: Wikipedia; SparkNotes
- name: Sylvia Plath
  events:
  - date: '1940-11-05'
    precision: day
    type: bereavement_parent
    description: Father Otto Plath died of complications following the amputation of a foot due to untreated
      diabetes, days after her 8th birthday — a defining, lifelong influence on her work
    significance: major
    age_at_event: 8
    source: Wikipedia; Smith College Libraries
  - date: '1950'
    precision: year
    type: education
    description: Entered Smith College on a scholarship
    significance: moderate
    age_at_event: 17
