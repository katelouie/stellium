    source: Smith College Libraries; Encyclopedia.com
  - date: '1953-08-24'
    precision: day
    type: health_crisis
    description: First suicide attempt (overdose of sleeping pills, hiding in the basement crawlspace);
      the experience that later informed The Bell Jar. Followed by hospitalization and electroconvulsive
      therapy
    significance: major
    age_at_event: 20
    source: Wikipedia; Heather Clark, Red Comet (Wiley excerpt)
  - date: '1955'
    precision: year
    type: education
    description: Graduated Smith summa cum laude; won a Fulbright Fellowship to Newnham College, Cambridge
    significance: major
    age_at_event: 22
    source: Wikipedia; Smith College Libraries
  - date: '1956-02-25'
    precision: day
    type: relationship
    description: Met poet Ted Hughes at the launch party for St. Botolph's Review in Cambridge
    significance: major
    age_at_event: 23
    source: History.com; Wikipedia
  - date: '1956-06-16'
    precision: day
    type: relationship
    description: Married Ted Hughes at St George the Martyr, Holborn, London, on Bloomsday
    significance: major
    age_at_event: 23
    source: Wikipedia; Smith College Libraries
  - date: '1960-04-01'
    precision: day
    type: childbirth
    description: Daughter Frieda born
    significance: major
    age_at_event: 27
    source: Medium (Counter Arts); corroborates ADB seed listing
  - date: '1962-01-17'
    precision: day
    type: childbirth
    description: Son Nicholas born
    significance: major
    age_at_event: 29
    source: Wikipedia; corroborates ADB seed listing
  - date: '1962'
    precision: year
    type: relationship
    description: Separated from Hughes after his affair with Assia Wevill (decisive break dated to July/September
      1962 by some sources)
    significance: major
    age_at_event: 29
    source: Britannica; Wikipedia
  - date: '1963-01-14'
    precision: day
    type: career
    description: 'The Bell Jar published in London by William Heinemann under the pseudonym Victoria Lucas,
      in an initial run of only 2,000 copies. Per the National Library of Scotland: ''The Bell Jar by
      Victoria Lucas was published on January 14th, 1963.'''
    significance: major
    age_at_event: 30
    source: National Library of Scotland; americanliterature.com
  - date: '1963-02-11'
    precision: day
    type: health_crisis
    description: Died by suicide (carbon monoxide poisoning) at her London flat at 23 Fitzroy Road, aged
      30
    significance: major
    age_at_event: 30
    source: Wikipedia; Britannica
