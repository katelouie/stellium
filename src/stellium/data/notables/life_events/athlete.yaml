# Notable life-events dataset — dated biographical events per native.
# PROVENANCE: gathered from biographies + AstroDataBank via research; sourced but
# NOT individually certificate-verified. Treat as Rodden ~B (secondary) grade, and
# honour each event's `precision` (day/month/year). Keyed by name (join to births/).

- name: Billie Jean King
  events:
  - date: '1961'
    precision: year
    type: recognition
    description: Won the Wimbledon women's doubles title with Karen Hantze (youngest pair to do so), age
      17
    significance: major
    age_at_event: 17
    source: Britannica; International Tennis Hall of Fame
  - date: '1965-09-17'
    precision: day
    type: relationship
    description: Married Larry King in Long Beach, California
    significance: major
    age_at_event: 21
    source: Wikipedia 'Billie Jean King'; WMST/Fandom
  - date: '1966'
    precision: year
    type: recognition
    description: Won her first Wimbledon singles title; became world No. 1
    significance: major
    age_at_event: 22
    source: Britannica; National Women's History Museum
  - date: '1968'
    precision: year
    type: recognition
    description: Won the Australian Open singles title
    significance: moderate
    age_at_event: 24
    source: Britannica; International Tennis Hall of Fame
  - date: 1970-10
    precision: month
    type: career
    description: One of the 'Original 9' who launched the Virginia Slims women's professional circuit
    significance: major
    age_at_event: 26
    source: International Tennis Hall of Fame; U.S. National Archives
  - date: '1971-09-27'
    precision: day
    type: windfall
    description: Became the first woman athlete to earn more than $100,000 in a season, reaching $117,000,
      clinched by defeating Rosie Casals 7–5, 6–1 at the Virginia Slims Thunderbird Invitational in Phoenix
    significance: major
    age_at_event: 27
    source: International Tennis Hall of Fame (tennisfame.com)
  - date: '1972'
    precision: year
    type: recognition
    description: Won the French Open singles title; named Sports Illustrated Sportsperson of the Year
      (first woman)
    significance: major
    age_at_event: 28
    source: Britannica; U.S. National Archives
  - date: '1973-09-20'
    precision: day
    type: recognition
    description: Defeated Bobby Riggs in the 'Battle of the Sexes' at the Houston Astrodome before ~90
      million TV viewers
    significance: major
    age_at_event: 29
    source: U.S. National Archives 'Looking Beyond the Battle of the Sexes'; Britannica
  - date: '1973'
    precision: year
    type: career
    description: Founded and became first president of the Women's Tennis Association (WTA)
    significance: major
    age_at_event: 29
    source: Wikipedia; Britannica
  - date: '1974'
    precision: year
    type: career
    description: Co-founded the Women's Sports Foundation and womenSports magazine; World TeamTennis began
      play
    significance: major
    age_at_event: 30
    source: Wikipedia; Britannica; National Women's History Museum
  - date: 1981-05
    precision: month
    type: legal
    description: Publicly outed as gay via a palimony lawsuit by former assistant Marilyn Barnett; lost
      endorsements
    significance: major
    age_at_event: 37
    source: Biography.com; Britannica; National Women's History Museum
  - date: '1984'
    precision: year
    type: career
    description: Became major owner of World TeamTennis, having become the first female commissioner of
      a pro sports league
    significance: moderate
    age_at_event: 40
    source: Wikipedia; Britannica
  - date: '1987'
    precision: year
    type: recognition
    description: Inducted into the International Tennis Hall of Fame
    significance: major
    age_at_event: 43
    source: International Tennis Hall of Fame; Britannica
  - date: '1987'
    precision: year
    type: relationship
    description: Divorced Larry King
    significance: major
    age_at_event: 43
    source: Biography.com; Britannica
  - date: '2018-10-18'
    precision: day
    type: relationship
    description: Married longtime partner Ilana Kloss (officiated by David Dinkins)
    significance: major
    age_at_event: 74
    source: Britannica (married Ilana Kloss, 18 October 2018)
