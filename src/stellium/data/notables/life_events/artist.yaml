# Notable life-events dataset — dated biographical events per native.
# PROVENANCE: gathered from biographies + AstroDataBank via research; sourced but
# NOT individually certificate-verified. Treat as Rodden ~B (secondary) grade, and
# honour each event's `precision` (day/month/year). Keyed by name (join to births/).

- name: Frida Kahlo
  events:
  - date: '1913'
    precision: year
    type: health_crisis
    description: Contracted polio, aged six, and was bedridden for several months, leaving her right leg
      withered
    significance: major
    age_at_event: 6
    source: 'V. Budrys, ''Neurological Deficits in the Life and Works of Frida Kahlo,'' European Neurology
      (Karger): ''Frida Kahlo caught polio in 1913, aged six, and had to spend several months in bed.'''
  - date: '1922'
    precision: year
    type: education
    description: Entered the National Preparatory School (Escuela Nacional Preparatoria), Mexico City
    significance: moderate
    age_at_event: 15
    source: Britannica; Writers Theatre timeline
  - date: '1925-09-17'
    precision: day
    type: accident
    description: Near-fatal bus/streetcar collision; an iron handrail impaled her pelvis, fracturing spine,
      pelvis and leg
    significance: major
    age_at_event: 18
    source: Biography.com 'How a Horrific Bus Accident Changed Frida Kahlo's Life'; Britannica
  - date: 1928-06
    precision: month
    type: relationship
    description: Introduced to (re-met) Diego Rivera at a party; began a relationship
    significance: major
    age_at_event: 20
    source: Writers Theatre timeline; Biography.com
  - date: '1929-08-21'
    precision: day
    type: relationship
    description: Married Diego Rivera
    significance: major
    age_at_event: 22
    source: Writers Theatre timeline; Mental Floss
  - date: 1930-11
    precision: month
    type: relocation
    description: Moved with Rivera to San Francisco
    significance: moderate
    age_at_event: 23
    source: Writers Theatre timeline
  - date: 1932-04
    precision: month
    type: relocation
    description: Moved to Detroit; Rivera painting murals for the Detroit Institute of Arts
    significance: moderate
    age_at_event: 24
    source: Writers Theatre timeline
  - date: '1932'
    precision: year
    type: health_crisis
    description: Suffered a miscarriage in Detroit and was hospitalized (inspired 'Henry Ford Hospital')
    significance: major
    age_at_event: 25
    source: Biography.com; Writers Theatre timeline
  - date: '1932'
    precision: year
    type: bereavement_parent
    description: Her mother, Matilde Calderón, died from surgery complications
    significance: major
    age_at_event: 25
    source: Writers Theatre timeline
  - date: 1937-01
    precision: month
    type: other
    description: Leon Trotsky arrived and lived at La Casa Azul for two years; she and Trotsky had a brief
      affair
    significance: moderate
    age_at_event: 29
    source: Writers Theatre timeline; Britannica
  - date: '1938'
    precision: year
    type: recognition
    description: First solo exhibition, at the Julien Levy Gallery, New York
    significance: major
    age_at_event: 31
    source: Wikipedia 'Frida Kahlo'; Writers Theatre timeline
  - date: 1939-03
    precision: month
    type: recognition
    description: Traveled to Paris; the Louvre acquired her painting The Frame, the first work by a 20th-century
      Mexican artist in its collection
    significance: major
    age_at_event: 31
    source: Writers Theatre timeline; Wikipedia
  - date: 1939-11
    precision: month
    type: relationship
    description: Divorced Diego Rivera
    significance: major
    age_at_event: 32
    source: Writers Theatre timeline; Britannica
  - date: '1940-12-08'
    precision: day
    type: relationship
    description: Remarried Diego Rivera in a civil ceremony in San Francisco
    significance: major
    age_at_event: 33
    source: Writers Theatre timeline
  - date: 1941-04
    precision: month
    type: bereavement_parent
    description: Her father, Guillermo Kahlo, died of a heart attack
    significance: major
    age_at_event: 33
    source: Writers Theatre timeline
  - date: '1943'
    precision: year
    type: career
    description: Began teaching at La Esmeralda art school, Mexico City
    significance: moderate
    age_at_event: 35
    source: Writers Theatre timeline; Britannica
  - date: '1953'
    precision: year
    type: recognition
    description: First solo exhibition in Mexico (Galería de Arte Contemporáneo); attended in a bed due
      to illness
    significance: major
    age_at_event: 45
    source: Britannica; Biography.com
  - date: '1953'
    precision: year
    type: health_crisis
    description: Right leg amputated below the knee due to gangrene
    significance: major
    age_at_event: 46
    source: Biography.com; Britannica
  - date: '1954-07-13'
    precision: day
    type: health_crisis
    description: Died at La Casa Azul, aged 47, of pulmonary embolism (probable suicide by overdose suspected)
    significance: major
    age_at_event: 47
    source: Biography.com; Wikipedia
