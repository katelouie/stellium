# Notable life-events dataset — dated biographical events per native.
# PROVENANCE: gathered from biographies + AstroDataBank via research; sourced but
# NOT individually certificate-verified. Treat as Rodden ~B (secondary) grade, and
# honour each event's `precision` (day/month/year). Keyed by name (join to births/).

- name: Alan Turing
  events:
  - date: '1926'
    precision: year
    type: education
    description: Entered Sherborne School
    significance: moderate
    age_at_event: 13
    source: 'Hodges, Alan Turing: The Enigma (1983)'
  - date: 1930-02
    precision: month
    type: bereavement_other
    description: Close friend Christopher Morcom died (formative bereavement)
    significance: major
    age_at_event: 17
    source: Hodges (1983); Stanford Encyclopedia of Philosophy
  - date: '1931'
    precision: year
    type: education
    description: Entered King's College, Cambridge
    significance: moderate
    age_at_event: 18
    source: Hodges (1983)
  - date: '1935'
    precision: year
    type: recognition
    description: Elected a Fellow of King's College, Cambridge
    significance: moderate
    age_at_event: 22
    source: Hodges (1983)
  - date: '1936'
    precision: year
    type: career
    description: Published 'On Computable Numbers' (introduced the Turing machine)
    significance: major
    age_at_event: 24
    source: Hodges (1983); Stanford Encyclopedia of Philosophy
  - date: '1938'
    precision: year
    type: education
    description: Completed PhD at Princeton University
    significance: moderate
    age_at_event: 25
    source: Hodges (1983)
  - date: 1939-09
    precision: month
    type: career
    description: Joined the Government Code and Cypher School at Bletchley Park (Enigma codebreaking)
    significance: major
    age_at_event: 27
    source: Hodges (1983)
  - date: '1941'
    precision: year
    type: relationship
    description: Briefly engaged to Joan Clarke
    significance: moderate
    age_at_event: 28
    source: Hodges (1983); Slate
  - date: '1946'
    precision: year
    type: recognition
    description: Appointed OBE for wartime services
    significance: moderate
    age_at_event: 33
    source: Hodges (1983)
  - date: '1950'
    precision: year
    type: career
    description: Published 'Computing Machinery and Intelligence' (the Turing Test)
    significance: major
    age_at_event: 37
    source: Hodges (1983); Stanford Encyclopedia of Philosophy
  - date: '1952-03-31'
    precision: day
    type: legal
    description: Convicted of gross indecency; accepted hormone treatment (chemical castration) as alternative
      to prison
    significance: major
    age_at_event: 39
    source: Wikipedia (Turing); Hodges (1983)
  - date: '1954-06-07'
    precision: day
    type: health_crisis
    description: Died of cyanide poisoning at Wilmslow; inquest ruled suicide (see notes for dispute)
    significance: major
    age_at_event: 41
    source: Wikipedia; Hodges (1983)
  - date: '2013-12-24'
    precision: day
    type: recognition
    description: Granted a posthumous royal pardon by Queen Elizabeth II
    significance: moderate
    age_at_event: null
    source: Wikipedia (Turing)
