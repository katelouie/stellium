    significance: major
    age_at_event: 14
    source: World History Encyclopedia timeline; corroborated in Massie (2011)
  - date: '1744-06-28'
    precision: day
    type: spiritual
    description: Received into the Russian Orthodox Church (OS), taking the name Yekaterina (Catherine)
      Alekseyevna
    significance: major
    age_at_event: 15
    source: Wikipedia; World History Encyclopedia timeline
  - date: '1745-08-21'
    precision: day
    type: relationship
    description: Married the future Peter III (21 Aug 1745 OS / 1 Sep 1745 NS), St Petersburg
    significance: major
    age_at_event: 16
    source: Britannica, 'Peter III'; Encyclopedia.com
  - date: '1754-09-20'
    precision: day
    type: childbirth
    description: Son Paul (Pavel Petrovich, future Paul I) born (20 Sep 1754 OS / 1 Oct 1754 NS)
    significance: major
    age_at_event: 25
    source: Encyclopedia.com, 'Catherine II the Great'
  - date: '1761-12-25'
    precision: day
    type: other
    description: Empress Elizabeth died; husband became Emperor Peter III, Catherine empress consort (25
      Dec 1761 OS / 5 Jan 1762 NS)
    significance: major
    age_at_event: 32
    source: Wikipedia, 'Catherine the Great'; Britannica
  - date: '1762-06-28'
    precision: day
    type: career
    description: Coup d'etat overthrew Peter III; Catherine proclaimed empress and autocrat (28 Jun 1762
      OS / 9 Jul 1762 NS)
    significance: major
    age_at_event: 33
    source: Britannica; Wikipedia; Simon Dixon 'Catherine the Great' (2009) ch.5
  - date: '1762-07-06'
    precision: day
    type: other
    description: Peter III died at Ropsha (6 Jul 1762 OS / 17 Jul 1762 NS). DISPUTED whether murdered
      on Catherine's orders — see notes
    significance: major
    age_at_event: 33
    source: Simon Dixon, 'Catherine the Great' (2009) ch.5; Britannica 'Peter III'
  - date: '1762-09-22'
    precision: day
    type: career
    description: Coronation at the Assumption Cathedral, Moscow (22 Sep 1762 OS)
    significance: major
    age_at_event: 33
    source: Wikipedia; World History Encyclopedia; erenow (Dixon text)
  - date: '1773'
    precision: year
    type: other
    description: Pugachev's Rebellion began (1773–1775), a major Cossack/peasant uprising
    significance: major
    age_at_event: 44
    source: Wikipedia, 'Peter III of Russia'; Encyclopedia.com
  - date: '1783'
    precision: year
    type: other
    description: Annexation of Crimea
    significance: major
    age_at_event: 54
    source: 'Encyclopedia.com, ''Catherine II the Great'' (timeline entry: ''annexation of the Crimea
      (1783)'')'
  - date: '1796-11-17'
    precision: day
    type: health_crisis
    description: Died of a stroke/apoplexy (6 Nov 1796 OS / 17 Nov 1796 NS), Winter Palace, St Petersburg
    significance: major
    age_at_event: 67
    source: Britannica; Encyclopedia.com; Simon Dixon (2009)
