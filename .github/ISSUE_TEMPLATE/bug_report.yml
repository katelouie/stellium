name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so I can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: "When I run X, I get Y, but I expected Z."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal Reproduction Code
      description: The smallest code snippet that reproduces the issue.
      render: python
      placeholder: |
        from stellium import ChartBuilder

        chart = ChartBuilder.from_details("1990-01-15 10:00", "New York, NY").calculate()
        # ... what triggers the bug
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error Output
      description: Full error message or traceback, if applicable.
      render: text

  - type: input
    id: stellium-version
    attributes:
      label: Stellium Version
      description: "Run: python -c \"import stellium; print(stellium.__version__)\""
      placeholder: "0.18.3"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: "Run: python --version"
      placeholder: "3.12.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
