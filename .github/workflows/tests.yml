name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel superseded runs on the same PR/branch to save minutes, but let main runs
# finish so every merged commit is validated on the record.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel the other jobs when one platform fails — we want to see
      # every platform's result on every run so a Windows-only regression
      # doesn't hide a macOS-only regression (or vice versa).
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: pyproject.toml

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run library tests
      run: pytest

    - name: Run linting
      # Lint once on the canonical platform — ruff output is
      # platform-independent so running it 9 times wastes CI minutes and
      # clutters the status checks.
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      run: |
        ruff check .
        ruff format --check .

  i18n-coverage:
    # Standalone job: surfaces as its own status check so a missing web
    # translation is diagnosed independently of the test matrix. Pure-stdlib
    # AST check — no project install needed, so it stays fast.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Check web i18n translation coverage
      # Every _("...") string in web/ must have a translation in each locale file.
      run: python web/i18n/check_coverage.py

  web-tests:
    # In-process tests for the NiceGUI web app: import smoke, the pure-logic
    # code-generator / i18n / state tests, and a few `user`-fixture interaction
    # checks (no browser/Selenium). Standalone job so web failures are diagnosed
    # independently and the library test matrix stays web-dependency-free.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: pyproject.toml

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]" nicegui pytest-asyncio

    - name: Run web app tests
      run: pytest web/tests -c web/tests/pytest.ini